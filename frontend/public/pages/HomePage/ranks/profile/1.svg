<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="800" height="800" overflow="visible">
  <defs>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff7d6"/>
      <stop offset="0.5" stop-color="#ffd86b"/>
      <stop offset="1" stop-color="#b8861f"/>
    </linearGradient>

    <linearGradient id="neonBlue" x1="0" x2="1">
      <stop offset="0" stop-color="#9be7ff"/>
      <stop offset="1" stop-color="#3aa7ff"/>
    </linearGradient>

    <radialGradient id="glow">
      <stop offset="0%" stop-color="#2aa6ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="black" stop-opacity="0"/>
    </radialGradient>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <style>
    /* TRANSPARENT BACKGROUND */
    svg {
      background: transparent;
      display: block;
    }

    /* FIXED TRANSFORM SYSTEM */
    .center {
      transform-origin: center;
      transform-box: view-box;
    }

    /* ROTATING RING */
    .ring {
      animation: rotate 6s linear infinite;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* NUMBER PULSE */
    .pulse {
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    /* GLOW */
    .glow {
      animation: flicker 2s infinite ease-in-out;
    }

    @keyframes flicker {
      0%,100% { opacity: 0.8; }
      50% { opacity: 1; }
    }

    /* ORBIT SYSTEM */
    .orbit {
      animation: spin 6s linear infinite;
      transform-origin: center;
      transform-box: view-box;
    }

    .orbit.fast {
      animation-duration: 4s;
      animation-direction: reverse;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .spark {
      animation: blink 1.5s infinite ease-in-out;
    }

    @keyframes blink {
      0%,100% { opacity:1; transform: scale(1); }
      50% { opacity:0.3; transform: scale(1.5); }
    }
  </style>

  <!-- OUTER RING -->
  <g class="ring center">
    <circle cx="100" cy="100" r="70" stroke="url(#neonBlue)" stroke-width="3" fill="none"/>
    <circle cx="100" cy="100" r="60" stroke="url(#neonBlue)" stroke-width="1" fill="none" opacity="0.5"/>
  </g>

  <!-- BADGE -->
  <g>
    <path d="M100 40 L140 70 L130 120 L100 150 L70 120 L60 70 Z"
          fill="url(#gold)" stroke="#222" stroke-width="2"/>
    
    <circle cx="100" cy="100" r="40" fill="url(#glow)"/>
  </g>

  <!-- GLOW EDGE -->
  <g class="glow">
    <path d="M100 40 L140 70 L130 120 L100 150 L70 120 L60 70 Z"
          fill="none" stroke="url(#neonBlue)" stroke-width="2"/>
  </g>

  <!-- ORBIT PARTICLES -->
  <g class="orbit center">
    <circle cx="100" cy="20" r="2" fill="#9be7ff" class="spark"/>
    <circle cx="180" cy="100" r="2" fill="#ffd86b" class="spark"/>
    <circle cx="100" cy="180" r="2" fill="#9be7ff" class="spark"/>
  </g>

  <g class="orbit fast center">
    <circle cx="40" cy="40" r="2" fill="#ffd86b" class="spark"/>
    <circle cx="160" cy="40" r="2" fill="#9be7ff" class="spark"/>
  </g>

  <!-- NUMBER (ONLY TEXT) -->
  <g class="pulse center">
    <text x="100" y="120"
          text-anchor="middle"
          font-size="80"
          font-family="Arial Black"
          fill="url(#gold)"
          stroke="#222"
          stroke-width="2">
      1
    </text>

    <!-- glow copy -->
    <text x="100" y="120"
          text-anchor="middle"
          font-size="80"
          font-family="Arial Black"
          fill="url(#gold)"
          opacity="0.2"
          filter="url(#softGlow)">
      1
    </text>
  </g>
</svg>