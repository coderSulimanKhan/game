<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="800" height="800" overflow="visible">
  <defs>
    <!-- Silver gradient (instead of gold) -->
    <linearGradient id="silver" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f0f0f0"/>
      <stop offset="0.5" stop-color="#c0c0c0"/>
      <stop offset="1" stop-color="#7a7a7a"/>
    </linearGradient>

    <!-- Softer blue -->
    <linearGradient id="neonBlue" x1="0" x2="1">
      <stop offset="0" stop-color="#c9f2ff"/>
      <stop offset="1" stop-color="#5aaeff"/>
    </linearGradient>

    <radialGradient id="glow">
      <stop offset="0%" stop-color="#5aaeff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="black" stop-opacity="0"/>
    </radialGradient>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <style>
    svg { background: transparent; display: block; }

    .center {
      transform-origin: center;
      transform-box: view-box;
    }

    /* Slightly slower rotation (less premium feel) */
    .ring {
      animation: rotate 8s linear infinite;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Softer pulse */
    .pulse {
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    /* Softer glow */
    .glow {
      animation: flicker 2.5s infinite ease-in-out;
    }

    @keyframes flicker {
      0%,100% { opacity: 0.7; }
      50% { opacity: 0.95; }
    }

    /* Orbit slower */
    .orbit {
      animation: spin 8s linear infinite;
      transform-origin: center;
      transform-box: view-box;
    }

    .orbit.fast {
      animation-duration: 6s;
      animation-direction: reverse;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .spark {
      animation: blink 2s infinite ease-in-out;
    }

    @keyframes blink {
      0%,100% { opacity:0.9; transform: scale(1); }
      50% { opacity:0.4; transform: scale(1.3); }
    }
  </style>

  <!-- OUTER RING -->
  <g class="ring center">
    <circle cx="100" cy="100" r="68" stroke="url(#neonBlue)" stroke-width="2.5" fill="none"/>
    <circle cx="100" cy="100" r="58" stroke="url(#neonBlue)" stroke-width="1" fill="none" opacity="0.4"/>
  </g>

  <!-- BADGE -->
  <g>
    <path d="M100 45 L135 70 L125 120 L100 145 L75 120 L65 70 Z"
          fill="url(#silver)" stroke="#333" stroke-width="1.5"/>
    
    <circle cx="100" cy="100" r="36" fill="url(#glow)"/>
  </g>

  <!-- GLOW EDGE -->
  <g class="glow">
    <path d="M100 45 L135 70 L125 120 L100 145 L75 120 L65 70 Z"
          fill="none" stroke="url(#neonBlue)" stroke-width="1.5"/>
  </g>

  <!-- ORBIT PARTICLES -->
  <g class="orbit center">
    <circle cx="100" cy="25" r="1.8" fill="#9be7ff" class="spark"/>
    <circle cx="175" cy="100" r="1.8" fill="#c0c0c0" class="spark"/>
    <circle cx="100" cy="175" r="1.8" fill="#9be7ff" class="spark"/>
  </g>

  <g class="orbit fast center">
    <circle cx="45" cy="45" r="1.5" fill="#c0c0c0" class="spark"/>
    <circle cx="155" cy="45" r="1.5" fill="#9be7ff" class="spark"/>
  </g>

  <!-- NUMBER -->
  <g class="pulse center">
    <text x="100" y="118"
          text-anchor="middle"
          font-size="72"
          font-family="Arial Black"
          fill="url(#silver)"
          stroke="#333"
          stroke-width="1.5">
      2
    </text>

    <!-- glow -->
    <text x="100" y="118"
          text-anchor="middle"
          font-size="72"
          font-family="Arial Black"
          fill="url(#silver)"
          opacity="0.2"
          filter="url(#softGlow)">
      2
    </text>
  </g>
</svg>